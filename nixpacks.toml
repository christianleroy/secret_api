[variables]
NIXPACKS_PHP_VERSION = "8.4"

[phases.build]
cmds = [
    "mkdir -p bootstrap/cache storage/logs storage/framework/cache storage/framework/sessions storage/framework/views",
    "chmod -R 775 bootstrap/cache storage",
    "composer install --no-dev --optimize-autoloader"
]

[start]
cmd = "php artisan migrate --force && php artisan config:cache && php artisan route:cache && php artisan serve --host=0.0.0.0 --port=$PORT"
